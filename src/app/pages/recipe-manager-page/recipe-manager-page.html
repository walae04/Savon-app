<div class="container mt-4">
    <div class="row">
        @for (recette of recettes; track recette.id) {
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100 border-success-subtle">
                <div class="card-header bg-success text-white">
                    <h5 class="card-title mb-0">{{ recette.titre }}</h5>
                </div>
                <div class="card-body">
                    <!-- <p class="text-muted small">Créée le : {{recette.dateCreation | date:'dd/MM/yyyy' }}</p> -->
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item d-flex justify-content-between">{{
                            recette.resultats[0].caracteristique.nom }}
                            <strong>{{ recette.resultats[0].score.toFixed(1) }}
                            </strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">{{
                            recette.resultats[1].caracteristique.nom}}
                            <strong>{{ recette.resultats[1].score.toFixed(1) }}
                            </strong>
                        </li>
                    </ul>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-outline-primary btn-sm">Détails</button>
                        <button (click)="deleteRecette(recette.id)" class="btnbtn-outline-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        } @empty {
        <div class="alert alert-info">Aucune recette trouvée.</div>
        }
    </div>
</div>
